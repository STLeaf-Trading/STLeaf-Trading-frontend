name: stleaf_trading
description: ST Leaf Trading - Vegetable Wholesale Supplier Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State Management
  provider: ^6.1.2

  # HTTP & Storage
  http: ^1.2.2
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.69.0

  # UI & Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  # Icons
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  image_picker: ^1.2.2
  firebase_storage: ^13.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
